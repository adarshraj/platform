    subdomain: bookshelf.homelab.local
    ports:
      frontend: 3000
      backend: 8080
    repo: adarshraj/bookshelf-haven
    depends_on: [auth-service, docbucket, ai-wrap]
    type: full-stack

  - name: vahan-track
    subdomain: vahan.homelab.local
