# Service Registry
# Authoritative record of all services in this platform.
# Add an entry here before deploying any new app or shared service.
# This file is machine-readable — scripts/deploy-app.sh and scripts/bootstrap.sh read it.
#
# Fields:
#   name        — unique identifier, used as Docker Compose stack name and Traefik router name
#   subdomain   — full homelab subdomain (swap homelab.local for your domain on VPS)
#   ports       — internal container ports (never host ports — Traefik handles routing)
#   repo        — GitHub repo (owner/repo)
#   depends_on  — list of service names that must be running before this one
#   type        — platform | shared-service | full-stack | frontend-only | backend-only | monolithic

# ─── Platform Infrastructure ────────────────────────────────────────────────

platform:
  - name: traefik
    subdomain: traefik.homelab.local
    ports: [80, 443]
    repo: adarshraj/platform
    type: platform
    stack_dir: infra/traefik

  - name: portainer
    subdomain: portainer.homelab.local
    ports: [9000]
    repo: adarshraj/platform
    type: platform
    stack_dir: infra/portainer

  - name: grafana
    subdomain: monitoring.homelab.local
    ports: [3000]
    repo: adarshraj/platform
    type: platform
    stack_dir: infra/monitoring

  - name: prometheus
    subdomain: ~              # internal only, no external route
    ports: [9090]
    repo: adarshraj/platform
    type: platform
    stack_dir: infra/monitoring

  - name: loki
    subdomain: ~              # internal only
    ports: [3100]
    repo: adarshraj/platform
    type: platform
    stack_dir: infra/logging

  - name: tempo
    subdomain: ~              # internal only — queried by Grafana
    ports: [3200, 4317, 4318]
    repo: adarshraj/platform
    type: platform
    stack_dir: infra/tracing

  - name: otel-collector
    subdomain: ~              # internal only — OTLP receiver for all services
    ports: [4317, 4318, 13133]
    repo: adarshraj/platform
    type: platform
    stack_dir: infra/tracing

  - name: infisical
    subdomain: secrets.homelab.local
    ports: [8080]
    repo: adarshraj/platform
    type: platform
    stack_dir: infra/secrets

  - name: verdaccio
    subdomain: npm.homelab.local
    ports: [4873]
    repo: adarshraj/platform
    type: platform
    stack_dir: infra/registry

  - name: crowdsec
    subdomain: ~              # internal only, no external route
    ports: [8080]
    repo: adarshraj/platform
    type: platform
    stack_dir: infra/traefik

  - name: uptime-kuma
    subdomain: status.homelab.local
    ports: [3001]
    repo: adarshraj/platform
    type: platform
    stack_dir: infra/uptime-kuma

  - name: docker-proxy
    subdomain: ~              # internal only, no external route
    ports: [2375]
    repo: adarshraj/platform
    type: platform
    stack_dir: infra/docker-proxy

# ─── Shared Services ────────────────────────────────────────────────────────

shared_services:
  - name: auth-service
    subdomain: auth.homelab.local
    ports:
      api: 8703
    repo: adarshraj/auth-service
    depends_on: []
    type: backend-only

  - name: ai-wrap
    subdomain: aiwrap.homelab.local
    ports:
      api: 8704
    repo: adarshraj/ai-wrap
    depends_on: []
    type: backend-only

  - name: docbucket
    subdomain: docbucket.homelab.local
    ports:
      api: 8705
    repo: adarshraj/DocBucket
    depends_on: []
    type: backend-only

# ─── ConvertedNut Applications ───────────────────────────────────────────────

apps:
