# ─── Port Conventions ────────────────────────────────────────────────────────
# These are internal container ports only. No app should use `ports:` in docker-compose.yml.
# All external routing goes through Traefik on 80/443.
#
# 3000  — SvelteKit / React / Node.js frontends
# 8080  — Quarkus backends
# 5432  — PostgreSQL (internal Docker network only, never routed)
# 6379  — Redis (internal Docker network only, never routed)
