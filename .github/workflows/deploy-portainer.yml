name: Deploy Stack via Portainer Webhook

on:
  workflow_call:
    inputs:
      stack-name:
        description: "Portainer stack name to redeploy"
        required: true
        type: string
    secrets:
      PORTAINER_WEBHOOK_URL:
        description: "Portainer stack webhook URL (from Portainer UI → Stacks → Webhooks)"
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Portainer stack update
        run: |
          echo "Deploying stack: ${{ inputs.stack-name }}"
          HTTP_STATUS=$(curl -X POST "${{ secrets.PORTAINER_WEBHOOK_URL }}" \
            --silent \
            --output /dev/null \
            --write-out "%{http_code}" \
            --max-time 30)
          echo "HTTP status: $HTTP_STATUS"
          if [[ "$HTTP_STATUS" -lt 200 || "$HTTP_STATUS" -ge 300 ]]; then
            echo "Deploy failed with HTTP $HTTP_STATUS"
            exit 1
          fi
          echo "Deploy triggered successfully."
