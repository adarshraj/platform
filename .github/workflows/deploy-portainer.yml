name: Deploy Stack via Portainer Webhook

on:
  workflow_call:
    inputs:
      stack-name:
        description: "Portainer stack name to redeploy"
        required: true
        type: string
    secrets:
      PORTAINER_WEBHOOK_URL:
        description: "Portainer stack webhook URL (from Portainer UI → Stacks → Webhooks)"
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions: {}
    steps:
      - name: Trigger Portainer stack update
        env:
          STACK_NAME: ${{ inputs.stack-name }}
          WEBHOOK_URL: ${{ secrets.PORTAINER_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "PORTAINER_WEBHOOK_URL not set — skipping deploy for stack: $STACK_NAME"
            echo "Set the secret in GitHub to enable automatic redeployment."
            exit 0
          fi
          echo "Deploying stack: $STACK_NAME"
          HTTP_STATUS=$(curl -X POST "$WEBHOOK_URL" \
            --silent \
            --output /dev/null \
            --write-out "%{http_code}" \
            --max-time 30)
          echo "HTTP status: $HTTP_STATUS"
          if [[ "$HTTP_STATUS" -lt 200 || "$HTTP_STATUS" -ge 300 ]]; then
            echo "Deploy failed with HTTP $HTTP_STATUS"
            exit 1
          fi
          echo "Deploy triggered successfully."
