name: Build and Push Docker Image

on:
  workflow_call:
    inputs:
      image-name:
        description: "Image name (e.g. bookshelf-haven-frontend)"
        required: true
        type: string
      dockerfile:
        description: "Path to Dockerfile"
        required: false
        type: string
        default: Dockerfile
      context:
        description: "Docker build context path"
        required: false
        type: string
        default: "."
      platforms:
        description: "Target platforms (e.g. linux/amd64,linux/arm64)"
        required: false
        type: string
        default: "linux/amd64"
    secrets:
      INFISICAL_CLIENT_ID:
        required: false
      INFISICAL_CLIENT_SECRET:
        required: false
    outputs:
      image-tag:
        description: "Full image tag that was pushed"
        value: ${{ jobs.build-push.outputs.image-tag }}

jobs:
  build-push:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write
      security-events: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # Snapshot env vars before Infisical so we can detect whether it exported anything
      - name: Snapshot env before Infisical
        if: ${{ secrets.INFISICAL_CLIENT_ID != '' }}
        run: env | sort > /tmp/env-before.txt

      # Optional: inject build-time secrets from Infisical
      # IMPORTANT: project-slug must exactly match the Infisical project slug,
      # not just the image name. If they differ, this step silently exports no
      # secrets. Override by passing a dedicated input or hardcoding per-repo.
      - name: Fetch secrets from Infisical
        if: ${{ secrets.INFISICAL_CLIENT_ID != '' }}
        uses: Infisical/secrets-action@8802effbe453d0576cd923567dcc2c97a1f54058
        with:
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          env-slug: production
          project-slug: ${{ inputs.image-name }}
          export-type: env

      - name: Verify Infisical secrets were exported
        if: ${{ secrets.INFISICAL_CLIENT_ID != '' }}
        env:
          IMAGE_NAME: ${{ inputs.image-name }}
        run: |
          # Compare env before and after Infisical to detect new variables.
          # If no new vars were added, Infisical likely returned nothing (slug mismatch).
          env | sort > /tmp/env-after.txt
          NEW_VARS=$(diff /tmp/env-before.txt /tmp/env-after.txt | grep "^> " | wc -l || true)
          rm -f /tmp/env-before.txt /tmp/env-after.txt
          if [ "$NEW_VARS" -eq 0 ]; then
            echo "::warning::Infisical exported 0 new secrets for project-slug '$IMAGE_NAME'. Verify the Infisical project name matches the image-name input."
          else
            echo "Infisical exported $NEW_VARS secret(s)."
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push
        id: build
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Scan for CRITICAL vulnerabilities — fails the build
      - name: Scan image for CRITICAL vulnerabilities
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947e0f18c8ea63fd80e
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}@${{ steps.build.outputs.digest }}
          severity: CRITICAL
          exit-code: "1"

      # Scan for HIGH+CRITICAL and upload to GitHub Security tab (advisory, does not fail build)
      - name: Scan image for all HIGH+ vulnerabilities
        if: always() && steps.build.outcome == 'success'
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947e0f18c8ea63fd80e
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy scan results
        if: always() && steps.build.outcome == 'success'
        uses: github/codeql-action/upload-sarif@3b1a19a80ab047f35cbb237b5bd9bdc1e14f166c
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true
