name: Build and Push Quarkus Docker Image

on:
  workflow_call:
    inputs:
      image-name:
        description: "Image name (e.g. bookshelf-haven-backend)"
        required: true
        type: string
      working-directory:
        description: "Directory containing the Maven project"
        required: false
        type: string
        default: "."
      java-version:
        description: "Java version"
        required: false
        type: string
        default: "21"
    secrets:
      INFISICAL_CLIENT_ID:
        required: false
      INFISICAL_CLIENT_SECRET:
        required: false
    outputs:
      image-tag:
        description: "Full image tag that was pushed"
        value: ${{ jobs.build-push.outputs.image-tag }}

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    outputs:
      image-tag: ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}:${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ inputs.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: temurin
          cache: maven

      - name: Fetch secrets from Infisical
        if: ${{ secrets.INFISICAL_CLIENT_ID != '' }}
        uses: Infisical/secrets-action@v1
        with:
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          env-slug: production
          project-slug: ${{ inputs.image-name }}
          export-type: env

      - name: Run tests
        run: ./mvnw test -B

      - name: Build Quarkus native-compatible JAR
        run: ./mvnw package -B -DskipTests

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.working-directory }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
