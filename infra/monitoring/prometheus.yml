global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Container metrics from cAdvisor
  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']

  # Traefik metrics
  - job_name: traefik
    static_configs:
      - targets: ['traefik:8082']

  # Auto-discover apps that opt-in with Docker labels:
  #   prometheus.scrape=true
  #   prometheus.port=<container-port>
  #   prometheus.path=/metrics  (optional, defaults to /metrics)
  - job_name: apps
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s
    relabel_configs:
      - source_labels: [__meta_docker_container_label_prometheus_scrape]
        action: keep
        regex: "true"
      - source_labels: [__meta_docker_container_name, __meta_docker_container_label_prometheus_port]
        separator: ':'
        regex: '/(.+):(\d+)'
        target_label: __address__
        replacement: '$1:$2'
      - source_labels: [__meta_docker_container_label_prometheus_path]
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        target_label: stack
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
