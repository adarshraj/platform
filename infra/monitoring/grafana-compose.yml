# Standalone Grafana — connects to Loki on monitoring_internal network.
# For full monitoring stack (Prometheus, alertmanager etc.) use docker-compose.yml.

services:
  grafana:
    image: grafana/grafana:12.4.2
    container_name: grafana
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 512m
    cpus: 1.0
    environment:
      - GF_SERVER_ROOT_URL=https://${GRAFANA_HOST:-monitoring.homelab.local}
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - platform_proxy
      - monitoring_internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`${GRAFANA_HOST:-monitoring.homelab.local}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls=true"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
      - "traefik.http.routers.grafana.middlewares=secure-headers@file"
      - "traefik.http.routers.grafana.service=grafana"

volumes:
  grafana_data:

networks:
  platform_proxy:
    external: true
  monitoring_internal:
    external: true
