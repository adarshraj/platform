storage: /verdaccio/storage
plugins: /verdaccio/plugins

web:
  title: homelab npm registry
  primary_color: "#4D5AE5"

auth:
  htpasswd:
    file: /verdaccio/storage/htpasswd
    max_users: 50
    algorithm: bcrypt

uplinks:
  npmjs:
    url: https://registry.npmjs.org/

packages:
  # Private packages under your org scope
  '@yourorg/*':
    access: $authenticated
    publish: $authenticated
    unpublish: $authenticated

  # All other packages: proxy through to public npm
  '**':
    access: $all
    proxy: npmjs

server:
  keepAliveTimeout: 60

middlewares:
  audit:
    enabled: true

logs:
  type: stdout
  format: pretty
  level: warn
