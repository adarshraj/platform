services:
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --protected-mode yes
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    tmpfs:
      - /tmp
    networks:
      - platform_proxy
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  redis_data:

networks:
  platform_proxy:
    external: true
