# Traefik v3 static configuration

api:
  dashboard: true
  insecure: false

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entrypoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"
    http:
      middlewares:
        - crowdsec@file
  metrics:
    address: ":8082"

providers:
  docker:
    exposedByDefault: false   # containers must opt-in with traefik.enable=true
    network: platform_proxy
    endpoint: "tcp://docker-proxy:2375"   # filtered socket proxy — no direct Docker socket access
  file:
    directory: /etc/traefik/dynamic
    watch: true               # hot-reload dynamic config changes
  plugin: {}

# CrowdSec bouncer plugin — blocks malicious IPs detected by CrowdSec
experimental:
  plugins:
    crowdsec-bouncer:
      moduleName: github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin
      version: v1.3.5

# Uncomment for public domains with Let's Encrypt:
# certificatesResolvers:
#   letsencrypt:
#     acme:
#       email: your@email.com
#       storage: /letsencrypt/acme.json
#       tlsChallenge: {}

# For homelab.local: use a self-signed wildcard cert via mkcert or step-ca.
# Place cert + key in infra/traefik/dynamic/tls.yml (see docs/local-dev.md).

log:
  level: INFO

accessLog:
  filePath: /var/log/traefik/access.log
  bufferingSize: 100

metrics:
  prometheus:
    entryPoint: metrics
    addEntryPointsLabels: true
    addServicesLabels: true
