services:
  infisical:
    image: infisical/infisical:v0.159.3
    container_name: infisical
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 1g
    cpus: 1.0
    depends_on:
      infisical-db:
        condition: service_healthy
      infisical-redis:
        condition: service_healthy
    environment:
      - ENCRYPTION_KEY=${INFISICAL_ENCRYPTION_KEY}
      - AUTH_SECRET=${INFISICAL_AUTH_SECRET}
      - DB_CONNECTION_URI=postgresql://infisical:${INFISICAL_DB_PASSWORD}@infisical-db:5432/infisical
      - REDIS_URL=redis://:${INFISICAL_REDIS_PASSWORD}@infisical-redis:6379
      - SITE_URL=https://secrets.homelab.local
    networks:
      - platform_proxy
      - infisical_internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.infisical.rule=Host(`secrets.homelab.local`)"
      - "traefik.http.routers.infisical.entrypoints=websecure"
      - "traefik.http.routers.infisical.tls=true"
      - "traefik.http.services.infisical.loadbalancer.server.port=8080"
      - "traefik.http.routers.infisical.middlewares=admin-auth@file"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/status"]
      interval: 30s
      timeout: 5s
      retries: 3

  infisical-db:
    image: postgres:16.13-alpine
    container_name: infisical-db
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 512m
    cpus: 1.0
    environment:
      - POSTGRES_USER=infisical
      - POSTGRES_PASSWORD=${INFISICAL_DB_PASSWORD}
      - POSTGRES_DB=infisical
    volumes:
      - infisical_db_data:/var/lib/postgresql/data
    networks:
      - infisical_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infisical"]
      interval: 10s
      timeout: 5s
      retries: 5

  infisical-redis:
    image: redis:7.4.8-alpine
    container_name: infisical-redis
    restart: unless-stopped
    user: "999:999"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 128m
    cpus: 0.5
    command: ["redis-server", "--requirepass", "${INFISICAL_REDIS_PASSWORD}"]
    tmpfs:
      - /data
    networks:
      - infisical_internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${INFISICAL_REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  infisical_db_data:

networks:
  platform_proxy:
    external: true
  infisical_internal:
    driver: bridge
