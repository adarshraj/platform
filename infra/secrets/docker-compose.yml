services:
  infisical:
    image: infisical/infisical:v0.159.3
    container_name: infisical
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 512m
    cpus: 1.0
    depends_on:
      infisical-db:
        condition: service_healthy
    environment:
      - ENCRYPTION_KEY=${INFISICAL_ENCRYPTION_KEY}
      - AUTH_SECRET=${INFISICAL_AUTH_SECRET}
      - DB_CONNECTION_URI=postgresql://infisical:${INFISICAL_DB_PASSWORD}@infisical-db:5432/infisical
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - SITE_URL=https://${INFISICAL_HOST:-secrets.homelab.local}
    networks:
      - platform_proxy
      - infisical_internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.infisical.rule=Host(`${INFISICAL_HOST:-secrets.homelab.local}`)"
      - "traefik.http.routers.infisical.entrypoints=websecure"
      - "traefik.http.routers.infisical.tls=true"
      - "traefik.http.services.infisical.loadbalancer.server.port=8080"
      - "traefik.http.routers.infisical.middlewares=secure-headers@file"
      - "traefik.http.routers.infisical.service=infisical"
    healthcheck:
      disable: true

  infisical-db:
    image: postgres:16-alpine
    container_name: infisical-db
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - FOWNER
      - DAC_OVERRIDE
      - SETUID
      - SETGID
    mem_limit: 256m
    cpus: 0.5
    environment:
      - POSTGRES_USER=infisical
      - POSTGRES_PASSWORD=${INFISICAL_DB_PASSWORD}
      - POSTGRES_DB=infisical
    volumes:
      - infisical_db_data:/var/lib/postgresql/data
    networks:
      - infisical_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infisical"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  infisical_db_data:

networks:
  platform_proxy:
    external: true
  infisical_internal:
    driver: bridge
